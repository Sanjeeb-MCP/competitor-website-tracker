<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Competitor Tracker // MISSION CONTROL</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="scanline"></div>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="app">
    <nav class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">CT</div>
        <span>Competitor<br>Tracker</span>
      </div>
      <div class="sidebar-nav">
        <a href="#" class="nav-item active" data-tab="overview">
          <span class="nav-icon">&#9632;&#9632;</span> Overview
        </a>
        <a href="#" class="nav-item" data-tab="changes">
          <span class="nav-icon">&#9650;&#9660;</span> Changes
        </a>
        <a href="#" class="nav-item" data-tab="activity">
          <span class="nav-icon">&#9608;&#9608;</span> Activity
        </a>
      </div>
      <div class="sidebar-footer">
        <button class="export-btn" onclick="exportExcel()">
          &#8615; Export Excel
        </button>
      </div>
    </nav>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu" onclick="toggleSidebar()">&#9776;</button>
          <h1 id="page-title">Overview</h1>
        </div>
        <div class="topbar-right">
          <span class="status-dot"></span>
          <span id="last-updated">Last sync: —</span>
        </div>
      </header>

      <!-- Overview Filters (time range only) -->
      <div class="filters-bar" id="overview-filters">
        <div class="filter-group">
          <label>TIME RANGE</label>
          <select id="filter-days">
            <option value="1">Last 24 hours</option>
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="0">All time</option>
            <option value="custom">Custom range</option>
          </select>
        </div>
        <div class="filter-group date-range-group" id="custom-from" style="display:none">
          <label>FROM</label>
          <input type="text" id="date-from" placeholder="Select date" class="datepicker-input" readonly>
        </div>
        <div class="filter-group date-range-group" id="custom-to" style="display:none">
          <label>TO</label>
          <input type="text" id="date-to" placeholder="Select date" class="datepicker-input" readonly>
        </div>
      </div>

      <!-- Changes Filters (all filters) -->
      <div class="filters-bar" id="changes-filters" style="display:none">
        <div class="filter-group">
          <label>COMPETITOR</label>
          <select id="filter-competitor"><option value="">All Competitors</option></select>
        </div>
        <div class="filter-group">
          <label>CHANGE TYPE</label>
          <select id="filter-type">
            <option value="">All Types</option>
            <option value="new_page">New Page</option>
            <option value="content_update">Content Update</option>
            <option value="page_removed">Page Removed</option>
            <option value="redirect">Redirect (301)</option>
            <option value="title_change">Title Change</option>
            <option value="meta_change">Meta Change</option>
            <option value="h1_change">H1 Change</option>
            <option value="schema_change">Schema Change</option>
            <option value="url_case_change">URL Case Change</option>
          </select>
        </div>
        <div class="filter-group">
          <label>TIME RANGE</label>
          <select id="filter-days-changes">
            <option value="1">Last 24 hours</option>
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="0">All time</option>
            <option value="custom">Custom range</option>
          </select>
        </div>
        <div class="filter-group date-range-group" id="custom-from-changes" style="display:none">
          <label>FROM</label>
          <input type="text" id="date-from-changes" placeholder="Select date" class="datepicker-input" readonly>
        </div>
        <div class="filter-group date-range-group" id="custom-to-changes" style="display:none">
          <label>TO</label>
          <input type="text" id="date-to-changes" placeholder="Select date" class="datepicker-input" readonly>
        </div>
      </div>

      <!-- Overview Tab -->
      <div class="tab-content active" id="tab-overview">
        <div class="stats-row" id="global-stats"></div>
        <div class="cards" id="competitor-cards"></div>
        <div class="timeline-header">
          <h2>Recent Changes <span id="overview-change-count"></span></h2>
        </div>
        <div id="overview-timeline"></div>
      </div>

      <!-- Changes Tab -->
      <div class="tab-content" id="tab-changes">
        <div class="timeline-header">
          <h2>Change Log <span id="change-count"></span></h2>
        </div>
        <div id="timeline-list"></div>
        <div class="pagination" id="pagination"></div>
      </div>

      <!-- Activity Filters -->
      <div class="filters-bar" id="activity-filters" style="display:none">
        <div class="filter-group">
          <label>TIME RANGE</label>
          <select id="filter-days-activity">
            <option value="1">Last 24 hours</option>
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="0">All time</option>
            <option value="custom">Custom range</option>
          </select>
        </div>
        <div class="filter-group date-range-group" id="custom-from-activity" style="display:none">
          <label>FROM</label>
          <input type="text" id="date-from-activity" placeholder="Select date" class="datepicker-input" readonly>
        </div>
        <div class="filter-group date-range-group" id="custom-to-activity" style="display:none">
          <label>TO</label>
          <input type="text" id="date-to-activity" placeholder="Select date" class="datepicker-input" readonly>
        </div>
      </div>

      <!-- Activity Tab -->
      <div class="tab-content" id="tab-activity">
        <div class="activity-stats-row" id="activity-stats"></div>
        <div class="chart-section">
          <h2>New Pages by Competitor</h2>
          <div class="chart-container" id="pub-chart"></div>
        </div>
        <div class="chart-section">
          <h2>All Changes by Competitor</h2>
          <div class="chart-container" id="activity-chart"></div>
        </div>
        <div class="chart-section">
          <h2>Change Type Breakdown</h2>
          <div class="chart-container" id="type-chart"></div>
        </div>
        <div class="chart-section">
          <h2>Weekly Trend</h2>
          <div class="chart-container" id="trend-chart"></div>
        </div>
      </div>

      <footer class="dashboard-footer">
        <span class="footer-pixel"></span>
        &copy; 2026 Intellectual Property of Sanjeeb Chetri. All rights reserved.
        <span class="footer-pixel"></span>
      </footer>
    </main>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
