name: Monitor Competitor Websites

on:
  schedule:
    - cron: '30 4 * * *'  # 4:30 AM UTC = 10:00 AM IST, daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run competitor monitor
        run: python -m tracker.main --config config/competitors.yml --verbose
        env:
          PYTHONUNBUFFERED: '1'

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/ docs/; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.check.outputs.changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git commit -m "chore: update competitor tracking data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push

  deploy:
    needs: monitor
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - run: git pull origin main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: 'docs'
      - id: deployment
        uses: actions/deploy-pages@v4
